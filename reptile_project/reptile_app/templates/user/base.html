<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Reptinote</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            /* ナビゲーション全体の文字フォントや余白を少し整える */
            body {
                font-family: sans-serif;
                margin: 0;
                padding: 0;
            }
            /*メニューバー（nav）の設定*/
            nav {
                padding: 10px;
                background-color: #f8f9fa;
                border-bottom: 1px solid #dee2e6;
            }
            /*メニューバーの中のリンクの設定*/
            nav a {
                margin-right: 15px;
                color: #007bff;
                text-decoration: none;
            }
            
            /*このベースを使うすべてのページの中身（content）を画面の縦横真ん中に寄せるための共通設定*/
            .main-center-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 80vh; /* 画面全体の高さの約8割を使って中央寄せ */
                width: 100%;
                box-sizing: border-box;
                padding: 40px 20px 20px 20px;
            }
            
            /* ラベルの文字折れ防止 */
            label {
                white-space: nowrap;
            }

            /* 共通ボタン（青） */
            .btn-app-submit {
                background-color: #89b2cc !important;
                border-color: #89b2cc !important;
                color: #212529 !important;
                font-weight: bold !important;
                min-width: 130px;
                height: 38px;
                border: none !important;
                border-radius: 0.375rem !important;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            /* 共通ボタン（グレー） */
            .btn-app-cancel {
                background-color: #c2c2c2 !important;
                border-color: #c2c2c2 !important;
                color: #212529 !important;
                font-weight: bold !important;
                min-width: 130px;
                height: 38px;
                border: none !important;
                border-radius: 0.375rem !important;
                text-decoration: none !important;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            /* 共通ボタン（赤） */
            .btn-app-danger {
                background-color: #ff9e9e !important;
                border-color: #ff9e9e !important;
                color: #212529 !important;
                font-weight: bold !important;
                min-width: 130px;
                height: 38px;
                border: none !important;
                border-radius: 0.375rem !important;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            
        </style>
    </head>
    <body>
        {#各画面の中身を真ん中に#}
        <div class="main-center-container">
            {% block content %}
            {% endblock %}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
