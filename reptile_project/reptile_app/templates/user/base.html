<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Reptinote</title>
        <style>
            /* ナビゲーション全体の文字フォントや余白を少し整える */
            body {
                font-family: sans-serif;
                margin: 0;
                padding: 0;
            }
            nav {
                padding: 10px;
                background-color: #f8f9fa;
                border-bottom: 1px solid #dee2e6;
            }
            nav a {
                margin-right: 15px;
                color: #007bff;
                text-decoration: none;
            }
            
            /*このベースを使うすべてのページの中身（content）を画面の縦横真ん中に寄せるための共通設定*/
            .main-center-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 80vh; /* 画面全体の高さの約8割を使って中央寄せ */
                width: 100%;
                box-sizing: border-box;
                padding: 40px 20px 20px 20px;
            }
        </style>
    </head>
    <body>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'user:index' %}">ホーム</a>
                <a href="{% url 'user:info' %}">ユーザー画面</a>
                <form action="{% url 'user:logout' %}" method="POST" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: #007bff; text-decoration: underline; cursor: pointer; padding: 0; font-size: 1rem;">ログアウト</button>
                </form>
            {% endif %}
        </nav>
        

        /*チェック用 後で消すこと*/
        <p style="padding: 5px 10px; margin: 0; font-size: 0.8rem; color: #6c757d;">
            デバッグ状態：{{ user }}:{{ user.is_authenticated }}
        </p>
        

        <div class="main-center-container">
            {% block content %}
            {% endblock %}
        </div>
    </body>
</html>
