{% extends "user/base.html" %}
{% block content %}

<div style="width: 100%; max-width: 380px; text-align: center;">

    <h2 style="font-weight: bold; color: #212529; margin-bottom: 30px; font-size: 1.5rem; text-align: center;">パスワード再設定</h2>

    {% if message %}
        <p style="color: red; font-weight: bold; font-size: 1.05rem; margin-bottom: 40px; line-height: 1.6; text-align: center;">
            新しいパスワードを設定しました。<br>
            下のボタンよりログイン画面へ戻り、<br>
            新しいパスワードでログインしてください。
        </p>

        <div style="width: 100%;">
            <a href="{% url 'user:login' %}" 
                style="background-color: #cccccc; color: black; font-weight: bold; border: 1px solid #6c757d; padding: 10px 0; width: 180px; font-size: 1.1rem; text-decoration: none; text-align: center; border-radius: 4px; display: inline-block;">
                ログイン画面に戻る
            </a>
        </div>
    {% else %}
        <form method="POST" style="margin-bottom: 20px;">
            {% csrf_token %}

            <div id="django-form-container" style="text-align: center; margin-bottom: 25px; width: 100%;">
                {{ form.as_p }}
            </div>

            <button type="submit" 
                style="background-color: #a4c2f4; color: black; font-weight: bold; border: 1px solid #6c757d; padding: 10px 0; margin-bottom: 20px; width: 180px; font-size: 1.2rem; cursor: pointer; border-radius: 4px; display: inline-block;">
                再設定
            </button>
        </form>
    {% endif %}

</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const paragraphs = document.querySelectorAll('#django-form-container p');
        paragraphs.forEach(p => {
            p.style.display = 'flex';
            p.style.flexDirection = 'column';
            p.style.alignItems = 'center';
            p.style.margin = '0 0 20px 0';
            p.style.width = '100%';
        });

        const inputs = document.querySelectorAll('#django-form-container input');
        inputs.forEach(input => {
            input.style.width = '100%';
            input.style.maxWidth = '380px';
            input.style.padding = '10px';
            input.style.border = '1px solid #212529';
            input.style.borderRadius = '4px';
            input.style.boxSizing = 'border-box';
            input.style.textAlign = 'center';
            input.style.margin = '0 auto';
        });

        const labels = document.querySelectorAll('#django-form-container label');
        labels.forEach(label => {
            label.style.fontWeight = 'bold';
            label.style.color = '#495057';
            label.style.marginBottom = '5px';
            label.style.fontSize = '1.1rem';
            label.style.textAlign = 'center';
            label.style.width = '100%';
            label.style.display = 'block';
            label.innerText = label.innerText.replace(':', '').replace('：', '');
        });
    });
</script>

{% endblock %}
