{% extends "reptile/reptile_base.html" %}
{% load static %}

{% block title %}Reptinote - パスワード変更{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <h3 class="fw-bold text-dark mb-5">パスワード変更</h3>

    <form method="POST" action="">
        {% csrf_token %}

        <div class="d-flex flex-column gap-4 mx-auto" style="max-width: 500px;">
            {% for field in form %}
                <div class="d-flex align-items-center">
                    <label class="fw-bold text-end pe-3" style="width: 180px; color: #333;">
                        {{ field.label }}:
                    </label>
                    <div class="flex-grow-1">
                        {{ field }}

                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        </div>

        <div class="d-flex gap-3 justify-content-center mt-5">
            <button type="submit" class="btn px-3 py-2 border border-dark"
                style="background-color: #a9c4f5; color: black; font-weight: bold; font-size: 1.1rem; white-space: nowrap;">
                変更
            </button>

            <a href="{% url 'user:settings_home' %}" class="btn px-3 py-2 border border-dark text-center text-decoration-none d-inline-flex align-items-center justify-content-center"
                style="background-color: #cccccc; color: black; font-weight: bold; font-size: 1.1rem; white-space: nowrap;">
                キャンセル
            </a>
        </div>
    </form>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('#deleteForm input, form input[type="password"]');
        inputs.forEach(input => input.classList.add('form-control'));
    });
</script>
{% endblock %}
